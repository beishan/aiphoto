server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/memoryvault}
    username: ${SPRING_DATASOURCE_USERNAME:memoryvault}
    password: ${SPRING_DATASOURCE_PASSWORD:memoryvault}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_REDIS_PASSWORD:memoryvault}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:memoryvault}
    password: ${SPRING_RABBITMQ_PASSWORD:memoryvault}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:memoryvault}
    secret-key: ${MINIO_SECRET_KEY:memoryvault}
    bucket-photos: photos
    bucket-thumbs: thumbs
  jwt:
    secret: ${JWT_SECRET:zyuaaRF5NrCVNn6ubybATQ3/Oeik70oNSsflUKKgF/Q=}
    expiration: 86400000  # 24 hours

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
